<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>0ch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- top navbar -->
  <header class="navbar">
    <div class="container" style="display: flex; align-items: center; gap: 1rem; padding: 0.4rem 3px;">
      <span style="color: #000000; white-space: nowrap; font-weight: 600;">0ch</span>
      <input
        type="search"
        id="search-input"
        placeholder="Search titles, authors, subjects…"
        style="flex-grow: 1; width: auto; margin-top: 0;"
        autocomplete="off"
        spellcheck="false"
      >
      <span id="search-count" style="white-space: nowrap; font-size: 0.8em; color: #888;"></span>
    </div>
  </header>

  <!-- main feed container -->
  <main class="container" id="feed">
    <!-- articles will be injected here -->
  </main>

  <script src="script.js"></script>
</body>
</html>
